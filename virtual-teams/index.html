<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #000;
      }

      #slide1,
      #slide2,
      #slide3,
      #slide4,
      #slide5,
      #slide6 {
        position: absolute;
        top: 0;
        left: 0;
        width: 1920px;
        height: 1080px;
        object-fit: cover;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="465"
      data-width="1920"
      data-height="1080"
    >
      <!-- Slide 1: Hire a Team with AI Assistant Personas (0s – 87s) -->
      <img
        id="slide1"
        class="clip"
        data-start="0"
        data-duration="87"
        data-track-index="0"
        src="assets/slides/Slide1.PNG"
        alt="Hire a Team with AI Assistant Personas"
      />
      <audio
        id="narration-slide1"
        class="clip"
        data-start="0"
        data-duration="87"
        data-track-index="1"
        data-volume="1"
        src="assets/audio/slide1.webm"
      ></audio>

      <!-- Slide 2: No Magic. Just Text Files. (87s – 168s) -->
      <img
        id="slide2"
        class="clip"
        data-start="87"
        data-duration="81"
        data-track-index="0"
        src="assets/slides/Slide2.PNG"
        alt="No Magic. Just Text Files."
      />
      <audio
        id="narration-slide2"
        class="clip"
        data-start="87"
        data-duration="81"
        data-track-index="1"
        data-volume="1"
        src="assets/audio/slide2.webm"
      ></audio>

      <!-- Slide 3: Working with Context vs. Working with a Persona (168s – 235s) -->
      <img
        id="slide3"
        class="clip"
        data-start="168"
        data-duration="67"
        data-track-index="0"
        src="assets/slides/Slide4.PNG"
        alt="Working with Context vs. Working with a Persona"
      />
      <audio
        id="narration-slide3"
        class="clip"
        data-start="168"
        data-duration="67"
        data-track-index="1"
        data-volume="1"
        src="assets/audio/slide4.webm"
      ></audio>

      <!-- Slide 4: Context sees everything · Persona gets what it needs (235s – 313s) -->
      <img
        id="slide4"
        class="clip"
        data-start="235"
        data-duration="78"
        data-track-index="0"
        src="assets/slides/Slide5.PNG"
        alt="Context sees everything · Persona gets what it needs"
      />
      <audio
        id="narration-slide4"
        class="clip"
        data-start="235"
        data-duration="78"
        data-track-index="1"
        data-volume="1"
        src="assets/audio/slide5.webm"
      ></audio>

      <!-- Slide 5: Persona Handoff · AI Agents Collaborating (313s – 381s) -->
      <img
        id="slide5"
        class="clip"
        data-start="313"
        data-duration="68"
        data-track-index="0"
        src="assets/slides/Slide6.PNG"
        alt="Persona Handoff · AI Agents Collaborating"
      />
      <audio
        id="narration-slide5"
        class="clip"
        data-start="313"
        data-duration="68"
        data-track-index="1"
        data-volume="1"
        src="assets/audio/slide6.webm"
      ></audio>

      <!-- Slide 6: Our Team (381s – 465s) -->
      <img
        id="slide6"
        class="clip"
        data-start="381"
        data-duration="84"
        data-track-index="0"
        src="assets/slides/Slide7.PNG"
        alt="Our Team"
      />
      <audio
        id="narration-slide6"
        class="clip"
        data-start="381"
        data-duration="84"
        data-track-index="1"
        data-volume="1"
        src="assets/audio/slide7.webm"
      ></audio>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Slide 1 entrance — fade in
      tl.from("#slide1", { opacity: 0, duration: 0.8, ease: "power2.out" }, 0.2);

      // Slide 2 entrance — fade in
      tl.from("#slide2", { opacity: 0, duration: 0.8, ease: "power2.out" }, 87.2);

      // Slide 3 entrance — fade in
      tl.from("#slide3", { opacity: 0, duration: 0.8, ease: "power2.out" }, 168.2);

      // Slide 4 entrance — fade in
      tl.from("#slide4", { opacity: 0, duration: 0.8, ease: "power2.out" }, 235.2);

      // Slide 5 entrance — fade in
      tl.from("#slide5", { opacity: 0, duration: 0.8, ease: "power2.out" }, 313.2);

      // Slide 6 entrance — fade in
      tl.from("#slide6", { opacity: 0, duration: 0.8, ease: "power2.out" }, 381.2);

      // Slide 6 exit — fade to black (final scene only)
      tl.to("#slide6", { opacity: 0, duration: 1.2, ease: "power2.in" }, 463.8);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
